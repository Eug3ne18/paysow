spring.application.name=paysow
server.port=8080

# ---- H2 Database (file-based so data survives restarts; change to mem: for a fresh DB each run) ----
spring.datasource.url=jdbc:h2:file:./data/paysowdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# ---- H2 web console (view your data at /h2-console) ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Thymeleaf ----
spring.thymeleaf.cache=false
