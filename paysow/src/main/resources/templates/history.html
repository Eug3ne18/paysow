<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transaction History - Paysow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="page-wide">
    <div class="card">
        <h2>📜 Transaction History</h2>

        <table th:if="${!transactions.isEmpty()}">
            <thead>
            <tr><th>Description</th><th>Type</th><th>Amount</th><th>Balance After</th><th>Date</th></tr>
            </thead>
            <tbody>
            <tr th:each="txn : ${transactions}">
                <td th:text="${txn.description}">Desc</td>
                <td>
                    <span class="badge"
                          th:classappend="${txn.typeLabel == 'CASH IN' or txn.typeLabel == 'SAVINGS OUT'} ? 'badge-in' : (${txn.typeLabel == 'CASH OUT'} ? 'badge-out' : 'badge-savings')"
                          th:text="${txn.typeLabel}">TYPE</span>
                </td>
                <td th:text="${'₱ ' + #numbers.formatDecimal(txn.amount, 1, 'COMMA', 2, 'POINT')}">₱0.00</td>
                <td th:text="${'₱ ' + #numbers.formatDecimal(txn.balanceAfter, 1, 'COMMA', 2, 'POINT')}">₱0.00</td>
                <td th:text="${#temporals.format(txn.timestamp, 'MMM dd, yyyy hh:mm a')}">Date</td>
            </tr>
            </tbody>
        </table>

        <div class="empty-state" th:if="${transactions.isEmpty()}">No transactions yet.</div>
    </div>
</div>
</body>
</html>
