<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paysow — Cash Out</title>
  <th:block th:replace="~{header :: styles}"></th:block>
  <style>
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 30px 20px; }
    .card { padding: 36px 32px; width: 100%; max-width: 480px; }
    .card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .card-icon { width: 52px; height: 52px; background: #fef2f2; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: #dc2626; }
    .card-title h2 { font-size: 1.35rem; font-weight: 700; color: #1a1a1a; }
    .card-title p { font-size: 0.82rem; color: #6b7280; margin-top: 2px; }
    .balance-badge { background: #eafbef; border: 1px solid #bce8c7; border-radius: 10px; padding: 12px 16px; font-size: 0.85rem; color: #4b5563; margin-bottom: 24px; }
    .balance-badge strong { font-size: 1.2rem; color: #16a34a; font-weight: 700; }
    .recipient-preview { display: none; background: #eafbef; border: 1px solid #bce8c7; border-radius: 10px; padding: 10px 14px; margin-top: -8px; margin-bottom: 16px; font-size: 0.83rem; color: #15803d; }
    .recipient-preview span { color: #6b7280; }
    .quick-amounts { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .quick-btn { padding: 7px 15px; border: 1px solid #e5e8eb; border-radius: 8px; background: #fff; color: #6b7280; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .quick-btn:hover { border-color: #dc2626; color: #dc2626; background: #fef2f2; }
    button.submit.danger { background: #dc2626; }
    .success-detail { margin-top: 6px; font-size: 0.78rem; color: #6b7280; }
  </style>
</head>
<body>
<nav th:replace="~{header :: nav}"></nav>
<main>
  <div class="card">
    <div class="card-header">
      <div class="card-icon">↑</div>
      <div class="card-title">
        <h2>Cash Out</h2>
        <p>Send money to another Paysow account</p>
      </div>
    </div>
    <div class="balance-badge">
      Available Balance: <strong>₱<span id="balance">0.00</span></strong>
    </div>

    <label>Recipient Phone Number</label>
    <div class="input-wrap">
      <input type="tel" id="recipientPhone" placeholder="e.g. 09123456789" oninput="lookupRecipient(this.value)" />
    </div>
    <div class="recipient-preview" id="recipientPreview">
      ✓ Sending to: <strong id="recipientName"></strong> &nbsp;<span id="recipientPhoneDisplay"></span>
    </div>

    <label>Amount (₱)</label>
    <div class="quick-amounts">
      <button class="quick-btn" onclick="setAmount(100)">₱100</button>
      <button class="quick-btn" onclick="setAmount(500)">₱500</button>
      <button class="quick-btn" onclick="setAmount(1000)">₱1,000</button>
      <button class="quick-btn" onclick="setAll()">All</button>
    </div>
    <div class="input-wrap">
      <input type="number" id="amount" placeholder="0.00" min="1" step="0.01"/>
    </div>

    <button class="submit danger" id="submitBtn" onclick="doCashOut()">Cash Out Now</button>
    <div class="msg" id="msg" style="display:none"></div>
  </div>
</main>
<footer th:replace="~{footer :: footer}"></footer>
<script>
let currentBalance = 0;
let lookupTimer = null;

async function logout() { await fetch('/api/logout', {method:'POST'}); window.location.href='/'; }
function setAmount(v) { document.getElementById('amount').value = v; }
function setAll() { document.getElementById('amount').value = currentBalance.toFixed(2); }

function lookupRecipient(phone) {
  clearTimeout(lookupTimer);
  const preview = document.getElementById('recipientPreview');
  preview.style.display = 'none';
  if (phone.length < 10) return;
  lookupTimer = setTimeout(async () => {
    try {
      const r = await fetch('/api/lookup?phone=' + encodeURIComponent(phone));
      if (r.ok) {
        const u = await r.json();
        document.getElementById('recipientName').textContent = u.fullName;
        document.getElementById('recipientPhoneDisplay').textContent = u.phone;
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
    } catch (_) {}
  }, 500);
}

async function doCashOut() {
  const recipientPhone = document.getElementById('recipientPhone').value.trim();
  const amount = document.getElementById('amount').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submitBtn');
  msg.style.display = 'none';

  if (!recipientPhone) {
    showMsg('error', 'Recipient phone number is required.'); return;
  }
  if (!amount || parseFloat(amount) <= 0) {
    showMsg('error', 'Enter a valid amount.'); return;
  }
  if (parseFloat(amount) > currentBalance) {
    showMsg('error', 'Insufficient balance.'); return;
  }

  btn.disabled = true;
  btn.textContent = 'Processing...';

  const fd = new FormData();
  fd.append('recipientPhone', recipientPhone);
  fd.append('amount', amount);

  const r = await fetch('/api/cashout', {method:'POST', body:fd});
  const d = await r.json();

  btn.disabled = false;
  btn.textContent = 'Cash Out Now';

  if (d.success) {
    currentBalance = parseFloat(d.newBalance);
    document.getElementById('balance').textContent = currentBalance.toFixed(2);
    document.getElementById('nav-balance').textContent = currentBalance.toFixed(2);
    document.getElementById('amount').value = '';
    document.getElementById('recipientPhone').value = '';
    document.getElementById('recipientPreview').style.display = 'none';

    msg.className = 'msg success';
    msg.innerHTML = `✓ <strong>₱${parseFloat(d.amount).toFixed(2)} sent successfully!</strong>
      <div class="success-detail">
        Reference No: ${d.referenceNo}<br>
        New Balance: ₱${currentBalance.toFixed(2)}<br>
        The recipient's account has been credited.
      </div>`;
    msg.style.display = 'block';
  } else {
    showMsg('error', d.message || 'Cash out failed.');
  }
}

function showMsg(type, text) {
  const msg = document.getElementById('msg');
  msg.className = 'msg ' + type;
  msg.textContent = text;
  msg.style.display = 'block';
}

async function loadUser() {
  const r = await fetch('/api/me');
  if (!r.ok) { window.location.href='/'; return; }
  const u = await r.json();
  currentBalance = parseFloat(u.balance);
  document.getElementById('balance').textContent = currentBalance.toFixed(2);
  document.getElementById('nav-balance').textContent = currentBalance.toFixed(2);
}
loadUser();
</script>
</body>
</html>
