<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Paysow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page center-card">
    <div class="logo">💸 Paysow</div>
    <div class="tagline">Your simple, secure e-wallet</div>

    <div class="card">
        <h2>Create your account</h2>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

        <form th:action="@{/signup}" method="post">
            <label>Full Name</label>
            <input type="text" name="fullName" placeholder="Juan Dela Cruz" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="juan@email.com" required>

            <label>Phone Number</label>
            <input type="tel" name="phoneNumber" placeholder="09171234567" required>

            <label>4-Digit PIN</label>
            <input type="password" name="pin" maxlength="4" pattern="\d{4}" inputmode="numeric" placeholder="••••" required>

            <label>Confirm PIN</label>
            <input type="password" name="confirmPin" maxlength="4" pattern="\d{4}" inputmode="numeric" placeholder="••••" required>

            <button type="submit" style="width:100%;">Sign Up</button>
        </form>

        <div class="switch-link">
            Already have an account? <a th:href="@{/login}">Log in</a>
        </div>
    </div>
</div>
</body>
</html>
