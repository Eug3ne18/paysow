<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paysow — Dashboard</title>
  <th:block th:replace="~{header :: styles}"></th:block>
  <style>
    main { flex: 1; padding: 32px 28px; max-width: 1000px; margin: 0 auto; width: 100%; }
    .balance-card {
      background: linear-gradient(135deg, #16a34a 0%, #128a3e 100%);
      color: #fff; border-radius: 20px; padding: 32px 36px;
      margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 12px 40px rgba(22,163,74,0.22);
      position: relative; overflow: hidden;
    }
    .balance-card::before {
      content: ''; position: absolute; right: -30px; top: -30px;
      width: 180px; height: 180px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    .balance-card::after {
      content: ''; position: absolute; right: 60px; bottom: -50px;
      width: 130px; height: 130px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .balance-card .label { font-size: 0.82rem; opacity: 0.85; margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; }
    .balance-card .amount { font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; }
    .balance-card .user-name { font-size: 0.9rem; opacity: 0.9; margin-top: 10px; font-weight: 500; }
    .balance-card .card-icon { font-size: 3.5rem; opacity: 0.3; position: relative; z-index: 1; }
    .quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
    .action-btn {
      background: #fff; border: 1px solid #e5e8eb; border-radius: 14px; padding: 20px 14px;
      text-align: center; text-decoration: none; color: #1a1a1a;
      transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .action-btn:hover { border-color: #16a34a; background: #f2fbf5; transform: translateY(-2px); }
    .action-btn .icon { font-size: 1.6rem; }
    .action-btn span { font-size: 0.82rem; font-weight: 600; color: #6b7280; }
    .section-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 14px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.8px; }
    .tx-card { background: #fff; border: 1px solid #e5e8eb; border-radius: 14px; overflow: hidden; }
    .tx-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid #e5e8eb;
      transition: background 0.1s;
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-item:hover { background: #fafbfc; }
    .tx-left { display: flex; align-items: center; gap: 12px; }
    .tx-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0;
    }
    .tx-icon.in { background: #eafbef; color: #16a34a; }
    .tx-icon.out { background: #fef2f2; color: #dc2626; }
    .tx-desc { font-size: 0.88rem; font-weight: 600; color: #1a1a1a; }
    .tx-date { font-size: 0.74rem; color: #9ca3af; margin-top: 2px; }
    .tx-amount { font-size: 0.95rem; font-weight: 700; }
    .tx-amount.in { color: #16a34a; }
    .tx-amount.out { color: #dc2626; }
    .empty { text-align: center; color: #9ca3af; padding: 40px 0; font-size: 0.88rem; }
  </style>
</head>
<body>
<nav th:replace="~{header :: nav}"></nav>
<main>
  <div class="balance-card">
    <div>
      <div class="label">Available Balance</div>
      <div class="amount">₱<span id="balance">0.00</span></div>
      <div class="user-name" id="fullname-display">Welcome!</div>
    </div>
    <div class="card-icon">💳</div>
  </div>
  <div class="quick-actions">
    <a href="/cashin" class="action-btn"><div class="icon">⬇️</div><span>Cash In</span></a>
    <a href="/cashout" class="action-btn"><div class="icon">⬆️</div><span>Cash Out</span></a>
    <a href="/inbox" class="action-btn"><div class="icon">📋</div><span>History</span></a>
  </div>
  <div class="section-title">Recent Transactions</div>
  <div class="tx-card" id="tx-list">
    <div class="empty">Loading...</div>
  </div>
</main>
<footer th:replace="~{footer :: footer}"></footer>
<script>
async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = '/'; }
function fmt(dt) { return new Date(dt).toLocaleString('en-PH', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
async function loadDashboard() {
  const r = await fetch('/api/me');
  if (!r.ok) { window.location.href = '/'; return; }
  const u = await r.json();
  document.getElementById('balance').textContent = parseFloat(u.balance).toFixed(2);
  document.getElementById('nav-balance').textContent = parseFloat(u.balance).toFixed(2);
  document.getElementById('fullname-display').textContent = 'Welcome, ' + u.fullName + '!';
  const tr = await fetch('/api/transactions');
  const txs = await tr.json();
  const list = document.getElementById('tx-list');
  if (!txs.length) { list.innerHTML = '<div class="empty">No transactions yet</div>'; return; }
  list.innerHTML = txs.slice(0, 10).map(tx => {
    const isIn = tx.type === 'CASH_IN';
    const cls = isIn ? 'in' : 'out';
    const sign = isIn ? '+' : '-';
    const icon = isIn ? '↓' : '↑';
    return `<div class="tx-item">
      <div class="tx-left">
        <div class="tx-icon ${cls}">${icon}</div>
        <div>
          <div class="tx-desc">${tx.description || tx.type}</div>
          <div class="tx-date">${fmt(tx.createdAt)} · ${tx.referenceNo}</div>
        </div>
      </div>
      <div class="tx-amount ${cls}">${sign}₱${parseFloat(tx.amount).toFixed(2)}</div>
    </div>`;
  }).join('');
}
loadDashboard();
</script>
</body>
</html>
