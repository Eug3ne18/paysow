<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paysow — History</title>
  <th:block th:replace="~{header :: styles}"></th:block>
  <style>
    main { flex: 1; padding: 32px 28px; max-width: 860px; margin: 0 auto; width: 100%; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .page-header h2 { font-size: 1.2rem; font-weight: 700; color: #1a1a1a; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 7px 16px; border-radius: 8px; border: 1px solid #e5e8eb; background: #fff; color: #6b7280; font-size: 0.82rem; cursor: pointer; font-weight: 600; transition: all 0.15s; font-family: inherit; }
    .filter-btn.active, .filter-btn:hover { background: #eafbef; color: #16a34a; border-color: #bce8c7; }
    .tx-card { background: #fff; border: 1px solid #e5e8eb; border-radius: 14px; overflow: hidden; }
    .tx-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #e5e8eb; transition: background 0.1s; }
    .tx-item:last-child { border-bottom: none; }
    .tx-item:hover { background: #fafbfc; }
    .tx-left { display: flex; align-items: center; gap: 12px; }
    .tx-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; font-weight: 700; }
    .tx-icon.in { background: #eafbef; color: #16a34a; }
    .tx-icon.out { background: #fef2f2; color: #dc2626; }
    .tx-desc { font-size: 0.88rem; font-weight: 600; color: #1a1a1a; }
    .tx-sub { font-size: 0.78rem; color: #16a34a; margin-top: 2px; font-weight: 500; }
    .tx-meta { font-size: 0.74rem; color: #9ca3af; margin-top: 2px; }
    .tx-status { display: inline-block; font-size: 0.7rem; padding: 2px 7px; border-radius: 4px; margin-left: 6px; font-weight: 600; }
    .tx-status.success { background: #eafbef; color: #16a34a; }
    .tx-right { text-align: right; }
    .tx-amount { font-size: 0.95rem; font-weight: 700; }
    .tx-amount.in { color: #16a34a; }
    .tx-amount.out { color: #dc2626; }
    .tx-balance { font-size: 0.73rem; color: #9ca3af; margin-top: 3px; }
    .empty { text-align: center; color: #9ca3af; padding: 40px 0; font-size: 0.88rem; }
  </style>
</head>
<body>
<nav th:replace="~{header :: nav}"></nav>
<main>
  <div class="page-header">
    <h2>Transaction History</h2>
    <div class="filters">
      <button class="filter-btn active" onclick="filterTx('all', this)">All</button>
      <button class="filter-btn" onclick="filterTx('CASH_IN', this)">Cash In</button>
      <button class="filter-btn" onclick="filterTx('CASH_OUT', this)">Cash Out</button>
    </div>
  </div>
  <div class="tx-card" id="tx-list">
    <div class="empty">Loading transactions...</div>
  </div>
</main>
<footer th:replace="~{footer :: footer}"></footer>
<script>
let allTxs = [];
async function logout() { await fetch('/api/logout', {method:'POST'}); window.location.href='/'; }
function fmt(dt) { return new Date(dt).toLocaleString('en-PH', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
function renderTxs(txs) {
  const list = document.getElementById('tx-list');
  if (!txs.length) { list.innerHTML = '<div class="empty">No transactions found</div>'; return; }
  list.innerHTML = txs.map(tx => {
    const isIn = tx.type === 'CASH_IN';
    const cls = isIn ? 'in' : 'out';
    const sign = isIn ? '+' : '-';
    const icon = isIn ? '↓' : '↑';
    const label = isIn ? 'Cash In' : 'Cash Out';
    const descHtml = tx.description
      ? `<div class="tx-sub">${tx.description}</div>`
      : '';
    return `<div class="tx-item">
      <div class="tx-left">
        <div class="tx-icon ${cls}">${icon}</div>
        <div>
          <div class="tx-desc">${label}</div>
          ${descHtml}
          <div class="tx-meta">${fmt(tx.createdAt)} · ${tx.referenceNo}<span class="tx-status success">${tx.status}</span></div>
        </div>
      </div>
      <div class="tx-right">
        <div class="tx-amount ${cls}">${sign}₱${parseFloat(tx.amount).toFixed(2)}</div>
        <div class="tx-balance">Balance: ₱${parseFloat(tx.balanceAfter).toFixed(2)}</div>
      </div>
    </div>`;
  }).join('');
}
function filterTx(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTxs(type === 'all' ? allTxs : allTxs.filter(t => t.type === type));
}
async function loadData() {
  const r = await fetch('/api/me');
  if (!r.ok) { window.location.href='/'; return; }
  const u = await r.json();
  document.getElementById('nav-balance').textContent = parseFloat(u.balance).toFixed(2);
  const tr = await fetch('/api/transactions');
  allTxs = await tr.json();
  renderTxs(allTxs);
}
loadData();
</script>
</body>
</html>
