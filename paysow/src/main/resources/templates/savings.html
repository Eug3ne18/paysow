<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Savings - Paysow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="page">
    <div class="stat-grid">
        <div class="stat-box">
            <div class="label">Wallet Balance</div>
            <div class="value">₱ <span th:text="${#numbers.formatDecimal(user.walletBalance, 1, 'COMMA', 2, 'POINT')}">0.00</span></div>
        </div>
        <div class="stat-box">
            <div class="label">Savings Balance</div>
            <div class="value">₱ <span th:text="${#numbers.formatDecimal(user.savingsBalance, 1, 'COMMA', 2, 'POINT')}">0.00</span></div>
        </div>
    </div>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <div class="card">
        <h2>🏦 Move to Savings</h2>
        <form th:action="@{/savings/deposit}" method="post">
            <label>Amount (₱)</label>
            <input type="number" name="amount" min="1" step="0.01" placeholder="300.00" required>
            <button type="submit" style="width:100%;">Save Money</button>
        </form>
    </div>

    <div class="card">
        <h2>↩️ Withdraw from Savings</h2>
        <form th:action="@{/savings/withdraw}" method="post">
            <label>Amount (₱)</label>
            <input type="number" name="amount" min="1" step="0.01" placeholder="100.00" required>
            <button type="submit" class="btn-secondary" style="width:100%; background:#fff; color:#0a7d3d; border:1px solid #0a7d3d;">Withdraw to Wallet</button>
        </form>
    </div>
</div>
</body>
</html>
