<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paysow — Cash In</title>
  <th:block th:replace="~{header :: styles}"></th:block>
  <style>
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 30px 20px; }
    .card { padding: 36px 32px; width: 100%; max-width: 480px; }
    .card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .card-icon { width: 52px; height: 52px; background: #eafbef; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: #16a34a; font-weight: 700; }
    .card-title h2 { font-size: 1.35rem; font-weight: 700; color: #1a1a1a; }
    .card-title p { font-size: 0.82rem; color: #6b7280; margin-top: 2px; }
    .balance-badge { background: #eafbef; border: 1px solid #bce8c7; border-radius: 10px; padding: 12px 16px; font-size: 0.85rem; color: #4b5563; margin-bottom: 24px; }
    .balance-badge strong { font-size: 1.2rem; color: #16a34a; font-weight: 700; }
    .quick-amounts { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .quick-btn { padding: 7px 15px; border: 1px solid #e5e8eb; border-radius: 8px; background: #fff; color: #6b7280; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .quick-btn:hover { border-color: #16a34a; color: #16a34a; background: #f2fbf5; }
  </style>
</head>
<body>
<nav th:replace="~{header :: nav}"></nav>
<main>
  <div class="card">
    <div class="card-header">
      <div class="card-icon">↓</div>
      <div class="card-title">
        <h2>Cash In</h2>
        <p>Add money to your Paysow wallet</p>
      </div>
    </div>
    <div class="balance-badge">
      Current Balance: <strong>₱<span id="balance">0.00</span></strong>
    </div>
    <label>Amount (₱)</label>
    <div class="quick-amounts">
      <button class="quick-btn" onclick="setAmount(100)">₱100</button>
      <button class="quick-btn" onclick="setAmount(500)">₱500</button>
      <button class="quick-btn" onclick="setAmount(1000)">₱1,000</button>
      <button class="quick-btn" onclick="setAmount(5000)">₱5,000</button>
    </div>
    <div class="input-wrap">
      <input type="number" id="amount" placeholder="0.00" min="1" step="0.01"/>
    </div>
    <label>Description (optional)</label>
    <div class="input-wrap">
      <input type="text" id="description" placeholder="e.g. GCash load, Bank transfer..."/>
    </div>
    <button class="submit" onclick="doCashIn()">Cash In Now</button>
    <div class="msg" id="msg" style="display:none"></div>
  </div>
</main>
<footer th:replace="~{footer :: footer}"></footer>
<script>
async function logout() { await fetch('/api/logout', {method:'POST'}); window.location.href='/'; }
function setAmount(v) { document.getElementById('amount').value = v; }
async function loadUser() {
  const r = await fetch('/api/me');
  if (!r.ok) { window.location.href='/'; return; }
  const u = await r.json();
  document.getElementById('balance').textContent = parseFloat(u.balance).toFixed(2);
  document.getElementById('nav-balance').textContent = parseFloat(u.balance).toFixed(2);
}
async function doCashIn() {
  const amount = document.getElementById('amount').value;
  const description = document.getElementById('description').value;
  const msg = document.getElementById('msg');
  msg.style.display = 'none';
  if (!amount || parseFloat(amount) <= 0) {
    msg.className='msg error'; msg.textContent='Enter a valid amount.'; msg.style.display='block'; return;
  }
  const fd = new FormData();
  fd.append('amount', amount);
  fd.append('description', description || 'Cash In');
  const r = await fetch('/api/cashin', {method:'POST', body:fd});
  const d = await r.json();
  if (d.success) {
    msg.className='msg success';
    msg.textContent = `✓ Cash in successful! Ref: ${d.referenceNo} | New Balance: ₱${parseFloat(d.newBalance).toFixed(2)}`;
    document.getElementById('amount').value = '';
    document.getElementById('description').value = '';
    document.getElementById('balance').textContent = parseFloat(d.newBalance).toFixed(2);
    document.getElementById('nav-balance').textContent = parseFloat(d.newBalance).toFixed(2);
  } else {
    msg.className='msg error'; msg.textContent = d.message || 'Cash in failed.';
  }
  msg.style.display='block';
}
loadUser();
</script>
</body>
</html>
