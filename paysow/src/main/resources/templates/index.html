<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paysow — Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f6f8f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e5e8eb;
      border-radius: 18px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 30px rgba(16,24,40,0.05);
    }
    .logo { text-align: center; margin-bottom: 26px; }
    .logo .leaf { font-size: 1.5rem; }
    .logo h1 { font-size: 1.45rem; font-weight: 800; color: #1a1a1a; letter-spacing: -0.3px; display: inline-flex; align-items: center; gap: 6px; }
    .logo h1 span { color: #16a34a; }
    .logo p { color: #9ca3af; font-size: 0.82rem; margin-top: 6px; }
    h2 { font-size: 1.15rem; font-weight: 700; color: #1a1a1a; margin-bottom: 16px; }
    label { font-size: 0.78rem; font-weight: 600; color: #6b7280; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
    .input-wrap { margin-bottom: 16px; }
    input {
      width: 100%;
      padding: 12px 14px;
      background: #fff;
      border: 1.5px solid #e5e8eb;
      border-radius: 10px;
      font-size: 0.92rem;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus { border-color: #16a34a; }
    input::placeholder { color: #9ca3af; }
    button {
      width: 100%;
      padding: 13px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      font-family: inherit;
      margin-top: 4px;
    }
    button:hover { opacity: 0.92; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .msg { margin-bottom: 16px; text-align: left; font-size: 0.85rem; padding: 11px 14px; border-radius: 8px; }
    .msg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .msg.success { background: #eafbef; color: #15803d; border: 1px solid #bce8c7; }
    .footer-link { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #6b7280; }
    .footer-link a { color: #16a34a; font-weight: 600; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1><span class="leaf">🍃</span>Pay<span>sow</span></h1>
    <p>Your simple, secure e-wallet</p>
  </div>
  <h2>Log in</h2>
  <div class="msg" id="msg" style="display:none"></div>
  <label>Phone Number</label>
  <div class="input-wrap">
    <input type="tel" id="phone" placeholder="09171234567" />
  </div>
  <label>PIN</label>
  <div class="input-wrap">
    <input type="password" id="pin" placeholder="****" maxlength="6" inputmode="numeric" />
  </div>
  <button onclick="login()">Log in</button>
  <div class="footer-link">Don't have an account? <a href="/signup">Sign up</a></div>
</div>
<script>
document.getElementById('pin').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('phone').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('pin').focus();
});

async function login() {
  const phone = document.getElementById('phone').value.trim();
  const pin = document.getElementById('pin').value;
  const msg = document.getElementById('msg');
  msg.style.display = 'none';
  if (!phone || !pin) { msg.className='msg error'; msg.textContent='Please enter phone number and PIN.'; msg.style.display='block'; return; }
  const fd = new FormData();
  fd.append('phone', phone);
  fd.append('pin', pin);
  const r = await fetch('/api/login', { method: 'POST', body: fd });
  const d = await r.json();
  if (d.success) {
    msg.className='msg success'; msg.textContent='✓ Login successful! Redirecting...'; msg.style.display='block';
    setTimeout(() => window.location.href = '/dashboard', 700);
  } else {
    msg.className='msg error'; msg.textContent = d.message || 'Login failed.'; msg.style.display='block';
    document.getElementById('pin').value = '';
  }
}
</script>
</body>
</html>
