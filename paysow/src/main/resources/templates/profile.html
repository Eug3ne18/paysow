<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paysow — Profile</title>
  <th:block th:replace="~{header :: styles}"></th:block>
  <style>
    main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 32px 20px; }
    .card { padding: 36px 32px; width: 100%; max-width: 520px; }
    .avatar-section { text-align: center; margin-bottom: 28px; }
    .avatar { width: 76px; height: 76px; background: #16a34a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; color: #fff; margin: 0 auto 12px; }
    .avatar-name { font-size: 1.2rem; font-weight: 700; color: #1a1a1a; }
    .member-since { font-size: 0.78rem; color: #9ca3af; margin-top: 4px; }
    .info-grid { display: grid; gap: 0; margin-bottom: 24px; border: 1px solid #e5e8eb; border-radius: 12px; overflow: hidden; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; border-bottom: 1px solid #e5e8eb; }
    .info-row:last-child { border-bottom: none; }
    .info-row .key { font-size: 0.8rem; color: #6b7280; font-weight: 500; }
    .info-row .val { font-size: 0.88rem; color: #1a1a1a; font-weight: 600; }
    .balance-chip { background: #eafbef; color: #16a34a; padding: 3px 12px; border-radius: 6px; font-weight: 700; }
    .divider { border: none; border-top: 1px solid #e5e8eb; margin: 24px 0; }
    .section-label { font-size: 0.78rem; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }
    .pin-hint { font-size: 0.72rem; color: #9ca3af; margin-top: -10px; margin-bottom: 12px; }
    .danger-zone { margin-top: 24px; padding: 16px; border-radius: 12px; background: #fef2f2; border: 1px solid #fecaca; }
    .danger-zone h3 { color: #dc2626; font-size: 0.88rem; margin-bottom: 6px; }
    .danger-zone p { font-size: 0.8rem; color: #6b7280; margin-bottom: 12px; }
    .danger-zone a { display: block; text-align: center; padding: 9px; background: #dc2626; color: #fff; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 600; }
  </style>
</head>
<body>
<nav th:replace="~{header :: nav}"></nav>
<main>
  <div class="card">
    <div class="avatar-section">
      <div class="avatar" id="avatar">?</div>
      <div class="avatar-name" id="uname">Loading...</div>
      <div class="member-since">Member since <span id="since">—</span></div>
    </div>
    <div class="info-grid">
      <div class="info-row"><span class="key">Full Name</span><span class="val" id="info-name">—</span></div>
      <div class="info-row"><span class="key">Email</span><span class="val" id="info-email">—</span></div>
      <div class="info-row"><span class="key">Phone</span><span class="val" id="info-phone">—</span></div>
      <div class="info-row"><span class="key">Balance</span><span class="val"><span class="balance-chip">₱<span id="info-balance">0.00</span></span></span></div>
    </div>
    <hr class="divider"/>
    <div class="section-label">Update Profile</div>
    <label>Full Name</label>
    <div class="input-wrap">
      <input type="text" id="edit-name" placeholder="Full name"/>
    </div>
    <label>Email</label>
    <div class="input-wrap">
      <input type="email" id="edit-email" placeholder="Email address"/>
    </div>
    <label>Phone</label>
    <div class="input-wrap">
      <input type="tel" id="edit-phone" placeholder="Phone number"/>
    </div>
    <label>New PIN (leave blank to keep current)</label>
    <div class="input-wrap">
      <input type="password" id="edit-pin" placeholder="New PIN (4-6 digits)" maxlength="6" inputmode="numeric"/>
    </div>
    <p class="pin-hint">Leave PIN blank to keep your current PIN</p>
    <button class="submit" onclick="updateProfile()">Save Changes</button>
    <div class="msg" id="msg" style="display:none"></div>
    <div class="danger-zone">
      <h3>⚠️ Danger Zone</h3>
      <p>Permanently delete your account and all data. This cannot be undone.</p>
      <a href="/delete">Delete My Account</a>
    </div>
  </div>
</main>
<footer th:replace="~{footer :: footer}"></footer>
<script>
async function logout() { await fetch('/api/logout', {method:'POST'}); window.location.href='/'; }
async function loadUser() {
  const r = await fetch('/api/me');
  if (!r.ok) { window.location.href='/'; return; }
  const u = await r.json();
  document.getElementById('avatar').textContent = u.fullName[0].toUpperCase();
  document.getElementById('uname').textContent = u.fullName;
  document.getElementById('since').textContent = new Date(u.createdAt).toLocaleDateString('en-PH', {year:'numeric', month:'long', day:'numeric'});
  document.getElementById('info-name').textContent = u.fullName;
  document.getElementById('info-email').textContent = u.email;
  document.getElementById('info-phone').textContent = u.phone;
  document.getElementById('info-balance').textContent = parseFloat(u.balance).toFixed(2);
  document.getElementById('nav-balance').textContent = parseFloat(u.balance).toFixed(2);
  document.getElementById('edit-name').value = u.fullName;
  document.getElementById('edit-email').value = u.email;
  document.getElementById('edit-phone').value = u.phone;
}
async function updateProfile() {
  const fullName = document.getElementById('edit-name').value.trim();
  const email = document.getElementById('edit-email').value.trim();
  const phone = document.getElementById('edit-phone').value.trim();
  const newPin = document.getElementById('edit-pin').value;
  const msg = document.getElementById('msg');
  msg.style.display = 'none';
  if (!fullName || !email || !phone) {
    msg.className='msg error'; msg.textContent='Full name, email, and phone are required.'; msg.style.display='block'; return;
  }
  if (newPin && !/^\d{4,6}$/.test(newPin)) {
    msg.className='msg error'; msg.textContent='PIN must be 4-6 digits.'; msg.style.display='block'; return;
  }
  const fd = new FormData();
  fd.append('fullName', fullName);
  fd.append('email', email);
  fd.append('phone', phone);
  if (newPin) fd.append('newPin', newPin);
  const r = await fetch('/api/profile', {method:'POST', body:fd});
  const d = await r.json();
  if (d.success) {
    msg.className='msg success'; msg.textContent='✓ Profile updated!'; document.getElementById('edit-pin').value = ''; loadUser();
  } else {
    msg.className='msg error'; msg.textContent = d.message;
  }
  msg.style.display='block';
}
loadUser();
</script>
</body>
</html>
