<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile - Paysow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="page">
    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <div class="card">
        <h2>👤 Profile Details</h2>
        <form th:action="@{/profile/update}" method="post">
            <label>Full Name</label>
            <input type="text" name="fullName" th:value="${user.fullName}" required>

            <label>Email</label>
            <input type="email" name="email" th:value="${user.email}" required>

            <label>Phone Number</label>
            <input type="tel" th:value="${user.phoneNumber}" disabled>

            <button type="submit" style="width:100%;">Save Changes</button>
        </form>
    </div>

    <div class="card">
        <h2>🔒 Change PIN</h2>
        <form th:action="@{/profile/change-pin}" method="post">
            <label>Current PIN</label>
            <input type="password" name="currentPin" maxlength="4" pattern="\d{4}" inputmode="numeric" required>

            <label>New PIN</label>
            <input type="password" name="newPin" maxlength="4" pattern="\d{4}" inputmode="numeric" required>

            <label>Confirm New PIN</label>
            <input type="password" name="confirmNewPin" maxlength="4" pattern="\d{4}" inputmode="numeric" required>

            <button type="submit" style="width:100%;">Update PIN</button>
        </form>
    </div>
</div>
</body>
</html>
