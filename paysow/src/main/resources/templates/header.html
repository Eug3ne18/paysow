<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/></head>
<body>

<!-- Shared design tokens + base styles used by every authenticated page -->
<th:block th:fragment="styles">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f6f8f9; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }

  .topnav { background: #ffffff; border-bottom: 1px solid #e5e8eb; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 62px; position: sticky; top: 0; z-index: 10; }
  .brand { display: flex; align-items: center; gap: 8px; font-size: 1.2rem; font-weight: 800; color: #1a1a1a; text-decoration: none; letter-spacing: -0.3px; }
  .brand .leaf { font-size: 1.15rem; }
  .brand span { color: #16a34a; }
  .topnav ul { list-style: none; display: flex; gap: 4px; }
  .topnav ul li a { color: #6b7280; text-decoration: none; font-size: 0.85rem; font-weight: 500; padding: 7px 14px; border-radius: 8px; transition: all 0.15s; }
  .topnav ul li a:hover { color: #1a1a1a; background: #f3f4f6; }
  .topnav ul li a.active { color: #16a34a; background: #eafbef; }
  .nav-right { display: flex; align-items: center; gap: 14px; font-size: 0.85rem; }
  .nav-balance-wrap { color: #4b5563; }
  .nav-balance { color: #16a34a; font-weight: 700; }
  .logout-btn { padding: 6px 14px; background: #fff; border: 1px solid #e5e8eb; color: #6b7280; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-family: inherit; transition: all 0.15s; width: auto; }
  .logout-btn:hover { border-color: #dc2626; color: #dc2626; transform: none; }

  .site-footer { background: #ffffff; border-top: 1px solid #e5e8eb; color: #9ca3af; text-align: center; padding: 14px; font-size: 0.78rem; margin-top: auto; }

  label { font-size: 0.78rem; font-weight: 600; color: #6b7280; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
  .input-wrap { position: relative; margin-bottom: 16px; }
  .input-wrap .icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 0.95rem; }
  input { width: 100%; padding: 12px 13px 12px 40px; background: #fff; border: 1.5px solid #e5e8eb; border-radius: 10px; font-size: 0.92rem; color: #1a1a1a; outline: none; transition: border-color 0.2s; font-family: inherit; }
  input:focus { border-color: #16a34a; }
  input::placeholder { color: #9ca3af; }

  button.submit { width: 100%; padding: 13px; background: #16a34a; color: #fff; border: none; border-radius: 10px; font-size: 0.98rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.2s, transform 0.1s; }
  button.submit:hover { opacity: 0.92; transform: translateY(-1px); }
  button.submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .msg { margin-top: 14px; font-size: 0.85rem; padding: 12px 14px; border-radius: 8px; }
  .msg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .msg.success { background: #eafbef; color: #15803d; border: 1px solid #bce8c7; }

  .card { background: #fff; border: 1px solid #e5e8eb; border-radius: 20px; box-shadow: 0 8px 30px rgba(16,24,40,0.04); }
</style>
</th:block>

<!-- Shared top navigation. Usage: <nav th:replace="~{header :: nav}"></nav> -->
<nav th:fragment="nav" class="topnav">
  <a href="/dashboard" class="brand"><span class="leaf">🍃</span>Pay<span>sow</span></a>
  <ul>
    <li><a href="/dashboard" data-nav="dashboard">Dashboard</a></li>
    <li><a href="/cashin" data-nav="cashin">Cash In</a></li>
    <li><a href="/cashout" data-nav="cashout">Cash Out</a></li>
    <li><a href="/inbox" data-nav="inbox">History</a></li>
    <li><a href="/profile" data-nav="profile">Profile</a></li>
  </ul>
  <div class="nav-right">
    <span class="nav-balance-wrap">₱<span class="nav-balance" id="nav-balance">0.00</span></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
  <script>
    (function () {
      var path = (window.location.pathname.split('/').filter(Boolean)[0]) || 'dashboard';
      var link = document.querySelector('.topnav a[data-nav="' + path + '"]');
      if (link) link.classList.add('active');
    })();
  </script>
</nav>

</body>
</html>
